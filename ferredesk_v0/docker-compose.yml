# FerreDesk - docker-compose de producción
# Uso:
#   - Lo usan el instalador y el launcher (prod y dev) para clientes.
#   - Siempre se copia como docker-compose.yml en el directorio de FerreDesk.
# Versión:
#   - La imagen se toma de FERREDESK_VERSION definido en el archivo .env.
#   - El launcher actualiza FERREDESK_VERSION cuando hay una versión nueva.
# Nota:
#   - El launcher nunca usa docker-compose-dev.yml, solo este archivo.

services:
  postgres:
    image: postgres:15
    container_name: ferredesk_postgres
    env_file:
      - .env
    environment:
      # Mantenemos tus configuraciones actuales
      TZ: America/Argentina/Buenos_Aires
      PGTZ: America/Argentina/Buenos_Aires
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Puerto externo 5433 para no chocar si el usuario tiene postgres local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app: 
    # Imagen de producción en Docker Hub; el tag lo aporta FERREDESK_VERSION desde .env.
    image: lautajuare/ferredesk:${FERREDESK_VERSION}
    container_name: ferredesk_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      IN_DOCKER: "True"
    volumes:
      # Solo persistimos media y estáticos recolectados si es necesario
      - ./media:/app/media
      - ./backups:/app/backups
      # IMPORTANTE: Ya no montamos el código (- ./backend:/app) 
      # porque queremos usar el código que está DENTRO de la imagen (producción)
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:

