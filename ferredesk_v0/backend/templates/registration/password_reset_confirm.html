<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Nueva contrasena</title>
</head>
<body>
    <h1>Definir nueva contrasena</h1>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Guardar contrasena</button>
        </form>
    {% else %}
        <p>El enlace ya no es valido. Solicita uno nuevo.</p>
    {% endif %}
</body>
</html>
