# FerreDesk - entorno local tipo Render/staging
# Uso:
#   docker compose -f docker-compose.prod-local.yml up --build
#
# Probar en:
#   http://lvh.me:8000
#   http://<tenant>.lvh.me:8000

services:
  postgres:
    image: postgres:15
    container_name: ferredesk_prod_local_postgres
    environment:
      POSTGRES_DB: FerreDesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fercien
      TZ: America/Argentina/Buenos_Aires
      PGTZ: America/Argentina/Buenos_Aires
    volumes:
      - postgres_prod_local_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FerreDesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ferredesk:prod-local
    container_name: ferredesk_prod_local_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: ferredesk_backend.settings.prod_local
      ENVIRONMENT: prod_local
      SECRET_KEY: prod-local-insecure-key
      DATABASE_URL: postgresql://postgres:fercien@postgres:5432/FerreDesk
      PRIMARY_DOMAIN: lvh.me
      PUBLIC_BASE_URL: http://lvh.me:8000
      FRONTEND_URL: http://lvh.me:8000
      ALLOWED_HOSTS: localhost,127.0.0.1,lvh.me,.lvh.me
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://lvh.me:8000,http://*.lvh.me:8000
      DEFAULT_FROM_EMAIL: no-reply@ferredesk.local
      RESEND_API_KEY: prod-local-dummy
      RESEND_API_URL: https://api.resend.com/emails
      RESEND_TIMEOUT: "3"
    volumes:
      - ./media:/app/media
      - ./backups:/app/backups
    ports:
      - "8000:8000"

volumes:
  postgres_prod_local_data:
