services:
  - type: web
    name: ferredesk-backend
    runtime: docker
    dockerfilePath: ./ferredesk_v0/Dockerfile
    dockerContext: ./ferredesk_v0
    healthCheckPath: /api/health/
    # Render Free: migrate_schemas se ejecuta como comando manual operativo.
    # Ver procedimiento en INSTRUCCIONES-MIGRACION-MANUAL-RENDER.md.
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ferredesk_backend.settings.prod
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_API_URL
        sync: false
      - key: RESEND_TIMEOUT
        sync: false
